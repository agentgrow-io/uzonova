<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Uzonova</title>
  <meta name="description" content="Insights on presales, solution selling, deal strategy, and revenue enablement for B2B SaaS and technology teams — from Uzonova.">
  <meta property="og:title" content="Blog — Uzonova">
  <meta property="og:description" content="Presales, solution selling, and revenue-enablement insights for B2B technology teams.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://agentgrow-io.github.io/uzonova/blog.html">
  <link rel="canonical" href="https://agentgrow-io.github.io/uzonova/blog.html">
  <link rel="stylesheet" href="css/blog.css">
</head>
<body>
  <div id="site-header"></div>

  <section class="page-hero">
    <div class="container-narrow">
      <span class="tag">Insights</span>
      <h1>The Uzonova Blog</h1>
      <p class="subtitle" style="color:var(--gray-300);margin-top:.5rem">Presales, solution selling, deal strategy, and revenue enablement — practical, no-hype.</p>
    </div>
  </section>

  <section class="blog-section">
    <div class="blog-featured">
      <div class="scroller-head reveal">
        <h2>Featured</h2>
        <div class="scroller-ctrls">
          <button data-scroll="prev" aria-label="Scroll left">&#8249;</button>
          <button data-scroll="next" aria-label="Scroll right">&#8250;</button>
        </div>
      </div>
      <div class="scroller" id="featured-scroller"></div>
    </div>
    <div class="container">
      <div class="filters" id="filters"></div>
      <div class="card-grid" id="posts-grid"></div>
      <div class="empty-state" id="empty-state" style="display:none">
        <p style="font-size:1.125rem;font-weight:600;color:var(--ink)">First post coming soon.</p>
        <p>Insights on presales, solution selling, and revenue enablement are on the way.</p>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="js/site.js" defer></script>
</body>
</html>
